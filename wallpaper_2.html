    .gallery-grid {

        border-color: var(--mauve);
        transform: scale(1.02);

    /* تنسيق أزرار التنقل بين الصفحات */

        display: flex;
        justify-content: center;

        padding: 10px 20px;
        background-color: var(--surface0);
        color: var(--blue);
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s;
    }

    .pagination a:hover {
        background-color: var(--mauve);
        color: var(--crust);
    }

    .pagination a.active {
        background-color: var(--green);
        color: var(--crust);
    }
</style>
